<div class="document-header">
  <div class="document-title">
    <span class="label"> Document Name</span>
    <span class="separator"> : </span>
    <span class="name">{{ documentName }}</span>
  </div>
  
  <div class="search-container">
    <input 
      type="text" 
      placeholder="search"
      class="search-input"
      (input)="onSearch($event)"
    />
    <div class="search-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 21L16.514 16.506L21 21ZM19 10.5C19 15.194 15.194 19 10.5 19C5.806 19 2 15.194 2 10.5C2 5.806 5.806 2 10.5 2C15.194 2 19 5.806 19 10.5Z" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>
