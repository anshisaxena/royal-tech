<div class="pdf-viewer-container">

  <!-- PDF Viewer -->
  <ng-container *ngIf="fileURL && !isImage">
    <pdf-viewer
      [src]="fileURL"
      [render-text]="true"
      [show-all]="true"
      [zoom]="1"
      (after-load-complete)="onPdfLoad($event)"
      (pageChange)="onPageChange($event)"
      style="width:100%; height:100%;">
    </pdf-viewer>
  </ng-container>

  <!-- Image Viewer -->
  <ng-container *ngIf="fileURL && isImage">
    <div class="image-wrapper">
      <img #imgRef
           [src]="fileURL | safeUrl"
           alt="Uploaded Image"
           class="image-viewer"
           (load)="onImageLoad(imgRef)" />
    </div>
  </ng-container>

  <!-- Overlay Layer -->
  <div class="overlay-layer">
    <ng-container *ngFor="let field of fieldMapping">
      <div class="box red-dashed"
           [style.top.px]="field.top * scale"
           [style.left.px]="field.left * scale"
           [style.width.px]="field.width * scale"
           [style.height.px]="field.height * scale">
        {{ originalData?.[field.key] }}
      </div>

      <input type="text"
             class="box"
             [ngClass]="{
               'blue-border': !editedFields.has(field.key),
               'yellow-border': editedFields.has(field.key)
             }"
             [(ngModel)]="tempValues[field.key]"
             (blur)="onBlur(field.key)"
             [style.top.px]="field.top * scale"
             [style.left.px]="(field.left + field.width + 5) * scale"
             [style.width.px]="field.width * scale"
             [style.height.px]="field.height * scale" />
    </ng-container>

    <!-- Dynamic inputs for keys present in jsonData but not in fieldMapping (e.g., OCR/CSV) -->
    <ng-container *ngFor="let key of getAllKeys()">
      <ng-container *ngIf="!isInFieldMapping(key)">
        <input type="text"
               class="box"
               [ngClass]="{
                 'blue-border': !editedFields.has(key),
                 'yellow-border': editedFields.has(key)
               }"
               [(ngModel)]="tempValues[key]"
               (blur)="onBlur(key)"
               [style.top.px]="getFieldTop(key)"
               [style.left.px]="getFieldLeft(key)"
               [style.width.px]="getFieldWidth(key)"
               [style.height.px]="getFieldHeight(key)" />
      </ng-container>
    </ng-container>
  </div>

  <!-- ✅ Selection Overlay for new field creation -->
  <div class="selection-box"
       *ngIf="selection"
       [style.top.px]="selection.top"
       [style.left.px]="selection.left"
       [style.width.px]="selection.width"
       [style.height.px]="selection.height">
  </div>

</div>
