<div class="pdf-viewer-container">
  <div class="pdf-scroll-layer">
    <!-- ✅ Use ng2-pdf-viewer instead of iframe -->
    <pdf-viewer
      *ngIf="fileURL"
      [src]="fileURL"
      [render-text]="true"
      [show-all]="true"
      [zoom]="1"
      style="width: 100%; height: 100%;"
    ></pdf-viewer>

    <!-- Overlay layer with boxes -->
    <div class="overlay-layer">
      <ng-container *ngFor="let field of fieldMapping">
        <!-- Red (readonly) -->
        <div class="box red-dashed"
             [style.top.px]="field.top"
             [style.left.px]="field.left"
             [style.width.px]="field.width"
             [style.height.px]="field.height * 0.5">
          {{ originalData?.[field.key] }}
        </div>

        <!-- Editable input -->
        <input type="text"
               class="box"
               [ngClass]="{
                 'blue-border': !editedFields.has(field.key),
                 'yellow-border': editedFields.has(field.key)
               }"
               [(ngModel)]="tempValues[field.key]"
               (blur)="onBlur(field.key)"
               [style.top.px]="field.top"
               [style.left.px]="field.left + field.width + 20"
               [style.width.px]="field.width"
               [style.height.px]="field.height * 0.5" />
      </ng-container>
    </div>
  </div>
</div>
