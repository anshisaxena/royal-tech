<div class="actions-section">
@if (showSubmit) {
  <div class="submit-container">
    <button class="btn btn-submit" (click)="onSubmit()">
      <span>SUBMIT</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.3333 4L6 11.3333L2.66667 8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
}

<!-- Bottom Action Buttons Container -->
<div class="bottom-actions-container">
  <!-- Save Button -->
  @if (showSave) {
    <button class="btn btn-save" (click)="onSave()">
      <span>SAVE</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M17 21V13H7V21M7 3V8H15M19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H16L21 8V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21Z" stroke="#F1F9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  }

  <!-- Next Button -->
  @if (showNext) {
    <button class="btn btn-next" (click)="onNext()">
      <span>NEXT</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M16.2803 7.71981C16.1388 7.58319 15.9493 7.5076 15.7527 7.50931C15.5561 7.51101 15.3679 7.58989 15.2289 7.72895C15.0898 7.868 15.011 8.05611 15.0092 8.25276C15.0075 8.44941 15.0831 8.63886 15.2197 8.78031L18.4395 12.0001H2.25C2.05109 12.0001 1.86032 12.0791 1.71967 12.2197C1.57902 12.3604 1.5 12.5511 1.5 12.7501C1.5 12.949 1.57902 13.1397 1.71967 13.2804C1.86032 13.421 2.05109 13.5001 2.25 13.5001H18.4395L15.2197 16.7198C15.1481 16.789 15.091 16.8718 15.0517 16.9633C15.0124 17.0548 14.9917 17.1532 14.9908 17.2528C14.9899 17.3523 15.0089 17.4511 15.0466 17.5433C15.0843 17.6354 15.14 17.7192 15.2105 17.7896C15.2809 17.86 15.3646 17.9157 15.4568 17.9534C15.549 17.9911 15.6477 18.0101 15.7473 18.0092C15.8469 18.0084 15.9453 17.9877 16.0368 17.9484C16.1283 17.9091 16.2111 17.8519 16.2803 17.7803L20.7803 13.2803C20.9209 13.1397 20.9998 12.9489 20.9998 12.7501C20.9998 12.5512 20.9209 12.3605 20.7803 12.2198L16.2803 7.71981Z" fill="#082491"/>
      </svg>
    </button>
  }
</div>
</div><
