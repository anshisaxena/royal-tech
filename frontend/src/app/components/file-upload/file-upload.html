<div class="upload-container">
  <h3 class="upload-title">File Upload</h3>

  <!-- Drag & Drop Upload Box -->
  <div class="upload-box"
       (dragover)="onDragOver($event)"
       (dragleave)="onDragLeave($event)"
       (drop)="onFileDrop($event)"
       [class.dragging]="isDragging"
       (click)="fileInput.click()">
    <div class="upload-icon">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5-5m0 0l5 5m-5-5v12" />
      </svg>
    </div>
    <p>Click or drag files here to upload</p>
    <input type="file" hidden #fileInput multiple
           (change)="onFileSelected($event)"
           accept=".pdf,.jpg,.jpeg,.png"/>
  </div>

  <!-- Uploaded Files -->
  <div class="file-card" *ngFor="let f of uploadedFiles">
    <div class="file-info">
      <div class="file-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 21h10a2 2 0 002-2V9.5a1 1 0 00-.293-.707l-5.5-5.5A1 1 0 0012.5 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
      </div>
      <div>
        <strong>{{ f.file.name }}</strong>
        <p>
          File Format: {{ getFileFormat(f) }} |
          Size: {{ f.file.size / 1024 | number:'1.0-0' }} KB
        </p>
      </div>
      <button class="remove-btn" (click)="removeFile(f)">✕</button>
    </div>
    <div class="file-preview" *ngIf="f.previewUrl">
      <img [src]="f.previewUrl" alt="Preview" />
    </div>
    <div class="file-progress">
      <div class="progress-bar" [style.width.%]="f.uploadProgress"></div>
    </div>
  </div>

  <!-- Accepted formats -->
  <p class="note">
    Formats accepted: <b>.pdf</b>, <b>.jpg</b>, <b>.png</b>
  </p>

  <div class="template-download">
    <button class="download-btn" (click)="downloadTemplate()">Download Sample Template</button>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="cancel-btn" (click)="onCancel()">Cancel</button>
    <button class="continue-btn" [disabled]="!canContinue" (click)="onContinue()">Continue</button>
  </div>
</div>
