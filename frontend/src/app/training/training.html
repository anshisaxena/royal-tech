<div class="training-container">
  <!-- Header -->
  <app-header [documentName]="documentName" (searchQuery)="handleSearch($event)"></app-header>

  <!-- Content -->
  <div class="content-section">
    <ng-container *ngIf="uploadedFiles.length; else placeholder">

      <!-- PDF Viewer -->
      <ng-container *ngIf="fileType === 'pdf' && showPDF">
        <div class="pdf-processor-placeholder">
          <app-pdf-overlay
            class="pdf-viewer"
            [fileURL]="getFileURL(uploadedFiles[0])"
            [fileObj]="uploadedFiles[0]"
            [originalData]="originalData"
            [jsonData]="jsonData">
          </app-pdf-overlay>
        </div>

        <div class="config-section">
          <app-pdf-config
            (promptChange)="handlePromptChange($event)"
            (fieldConfigChange)="handleFieldConfigChange($event)"
            (actionTriggered)="handleActionTriggered($event)">
          </app-pdf-config>
        </div>
      </ng-container>

      <!-- Image Viewer with Overlay -->
      <ng-container *ngIf="fileType === 'image'">
        <div class="images-scroll-container">
          <div class="image-wrapper" *ngFor="let file of uploadedFiles">
            <app-pdf-overlay
              class="image-viewer"
              [fileURL]="getFileURL(file)"
              [fileObj]="file"
              [originalData]="originalData"
              [jsonData]="jsonData">
            </app-pdf-overlay>
          </div>
        </div>
      </ng-container>

    </ng-container>

    <ng-template #placeholder>
      <div class="pdf-processor-placeholder">
        <p>No file uploaded yet</p>
        <p class="note">Upload a PDF or Image to preview it here</p>
      </div>
    </ng-template>
  </div>

  <!-- Action Buttons -->
  <app-action-buttons
    [showSubmit]="true"
    [showSave]="true"
    [showNext]="true"
    (submit)="handleSubmit()"
    (save)="handleSave()"
    (next)="handleNext()">
  </app-action-buttons>
</div>
