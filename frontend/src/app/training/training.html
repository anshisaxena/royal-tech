<div class="training-container">
  <!-- Header -->
  <app-header [documentName]="documentName" (searchQuery)="handleSearch($event)"></app-header>

  <!-- Content -->
  <div class="content-section">
    <ng-container *ngIf="uploadedFiles.length; else placeholder">

      <!-- Viewer Section -->
      <div class="viewer-section">
        <!-- PDF Viewer -->
        <ng-container *ngIf="fileType === 'pdf' && showPDF">
          <div class="pdf-processor-placeholder">
            <app-pdf-overlay
              class="pdf-viewer"
              [fileURL]="getFileURL(uploadedFiles[0])"
              [fileObj]="uploadedFiles[0]"
              [originalData]="originalData"
              [jsonData]="jsonData"
              [currentPage]="1"
              [highlights]="highlights">
            </app-pdf-overlay>
          </div>
        </ng-container>

        <!-- Image Viewer -->
        <ng-container *ngIf="fileType === 'image'">
          <div class="image-wrapper" *ngIf="uploadedFiles.length">
            <app-pdf-overlay
              class="image-viewer"
              [fileURL]="getFileURL(uploadedFiles[currentImageIndex])"
              [fileObj]="uploadedFiles[currentImageIndex]"
              [originalData]="originalData"
              [jsonData]="jsonData"
              [currentPage]="currentImageIndex + 1"
              [highlights]="highlights">
            </app-pdf-overlay>

            <!-- Image selector toolbar -->
            <div class="image-selector">
              <button (click)="prevImage()" [disabled]="currentImageIndex === 0">Prev</button>
              <label>Image:</label>
              <input type="number" min="1" [max]="uploadedFiles.length"
                     [(ngModel)]="currentImageIndexInput"
                     (change)="showImageByNumber(currentImageIndexInput)">
              <span>/ {{ uploadedFiles.length }}</span>
              <button (click)="nextImage()" [disabled]="currentImageIndex === uploadedFiles.length - 1">Next</button>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Config Section -->
      <div class="config-section">
        <app-pdf-config
          [currentPage]="currentPageForConfig"
          (promptChange)="handlePromptChange($event)"
          (fieldConfigChange)="handleFieldConfigChange($event)"
          (actionTriggered)="handleActionTriggered($event)"
          (highlightRequested)="handleHighlight($event)">
        </app-pdf-config>
      </div>

    </ng-container>

    <ng-template #placeholder>
      <div class="pdf-processor-placeholder">
        <p>No file uploaded yet</p>
        <p class="note">Upload a PDF or Image to preview it here</p>
      </div>
    </ng-template>
  </div>

  <!-- Action Buttons -->
  <app-action-buttons
    [showSubmit]="true"
    [showSave]="true"
    [showNext]="true"
    (submit)="handleSubmit()"
    (save)="handleSave()"
    (next)="handleNext()">
  </app-action-buttons>
</div>
