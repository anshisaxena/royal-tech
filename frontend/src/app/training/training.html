<div class="training-container">
  <!-- Header -->
  <app-header [documentName]="documentName" (searchQuery)="handleSearch($event)"></app-header>

  <!-- Content -->
  <div class="content-section">
    <ng-container *ngIf="fileURL && showPDF; else placeholder">
      <!-- PDF Viewer Section -->
      <div class="pdf-processor-placeholder">
        <app-pdf-overlay
          class="pdf-viewer"
          [fileURL]="fileURL"
          [originalData]="originalData"
          [jsonData]="jsonData">
        </app-pdf-overlay>
      </div>

      <!-- PDF Config Section (Positioned Between PDF Viewer and Action Buttons) -->
      <div class="config-section">
        <app-pdf-config
          (promptChange)="handlePromptChange($event)"
          (fieldConfigChange)="handleFieldConfigChange($event)"
          (actionTriggered)="handleActionTriggered($event)">
        </app-pdf-config>
      </div>
    </ng-container>

    <ng-template #placeholder>
      <div class="pdf-processor-placeholder">
        <p>No file uploaded yet</p>
        <p class="note">Upload a PDF to preview it here</p>
      </div>
    </ng-template>
  </div>

  <!-- Action Buttons -->
  <app-action-buttons
    [showSubmit]="true"
    [showSave]="true"
    [showNext]="true"
    (submit)="handleSubmit()"
    (save)="handleSave()"
    (next)="handleNext()">
  </app-action-buttons>
</div>
