<div class="training-container">
  <!-- Header -->
  <app-header [documentName]="documentName" (searchQuery)="handleSearch($event)"></app-header>

  <!-- Content -->
  <div class="content-section">
    <ng-container *ngIf="fileURL; else placeholder">
      <div class="pdf-processor-placeholder">
        <app-pdf-overlay
          class="pdf-viewer"
          [fileURL]="fileURL"
          [originalData]="originalData"
          [jsonData]="jsonData">
        </app-pdf-overlay>
      </div>
    </ng-container>

    <ng-template #placeholder>
      <div class="pdf-processor-placeholder">
        <p>No file uploaded yet</p>
        <p class="note">Upload a PDF to preview it here</p>
      </div>
    </ng-template>
  </div>

  <!-- Action Buttons -->
  <app-action-buttons
    [showSubmit]="true"
    [showSave]="true"
    [showNext]="true"
    (submit)="handleSubmit()"
    (save)="handleSave()"
    (next)="handleNext()">
  </app-action-buttons>
</div>
